version: "3.9"

services:
  api:
    build: .
    container_name: habitflow-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - habitflow-db:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/habitflow.db
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  habitflow-db:
